<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English Reader</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background-color: #f9f9f9;
}

.container{
    max-width: 900px;
    margin: 0 auto;
    height:100vh;
    display: flex;
    flex-direction: column;
}

/* Bài đọc */

.reader{
    flex:1;
    /* Tăng padding-bottom lên 55vh để có thể cuộn những dòng cuối cùng lên trên popup */
    padding: 20px 20px 55vh 20px; 
    overflow-y:auto;
    background: #fff;
    box-shadow: 0 0 10px rgba(0,0,0,0.05);
}

.toolbar{
    margin-bottom:20px;
    position: sticky;
    top: 0;
    background: #fff;
    padding: 10px 0;
    border-bottom: 1px solid #eee;
    z-index: 10;
}

.toolbar button{
    padding:8px 15px;
    font-size:16px;
    cursor:pointer;
    border: 1px solid #ccc;
    background: #f0f0f0;
    border-radius: 4px;
    margin-right: 5px;
}

#content{
    font-size:26px;
    line-height:2;
}

/* Định dạng đoạn văn & Đánh số */
.paragraph {
    display: flex;
    margin-bottom: 20px;
}

.para-num {
    color: #b0b0b0;
    font-size: 14px;
    min-width: 30px;
    user-select: none;
    padding-top: 8px;
    font-weight: bold;
}

.para-content {
    flex: 1;
    text-align: justify; /* Đã thêm tính năng căn đều 2 bên tại đây */
}

/* Từ */

.word{
    cursor:pointer;
    border-radius:4px;
    padding:2px 3px;
    transition:0.2s;
}

.word:hover{
    background:#fff3a0;
}

.word.active{
    background:#ffe082;
}

/* Panel từ điển dạng Bottom Sheet - Không dùng Overlay chặn màn hình nữa */

.dictionary{
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translate(-50%, 100%); 
    width: 100%;
    max-width: 500px; 
    max-height: 50vh; /* Giới hạn chiều cao popup bằng 50% màn hình */
    border-radius: 16px 16px 0 0; 
    padding: 30px 20px 20px 20px; /* Thêm padding top để nhường chỗ cho nút X */
    overflow-y: auto;
    background: #fafafa;
    box-shadow: 0 -5px 25px rgba(0,0,0,0.15);
    z-index: 1000;
    
    visibility: hidden;
    transition: transform 0.3s ease-out, visibility 0.3s;
}

.dictionary.show {
    transform: translate(-50%, 0);
    visibility: visible;
}

/* Nút đóng popup chủ động */
.close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 20px;
    color: #aaa;
    cursor: pointer;
    padding: 5px;
    user-select: none;
}

.close-btn:hover {
    color: #333;
}

#selectedWord{
    font-size:26px;
    font-weight:bold;
    margin-bottom: 5px;
    color: #333;
}

#phonetic{
    color:#666;
    font-size:16px;
}

#audioBtn{
    font-size:24px;
    cursor:pointer;
    margin-left:10px;
    vertical-align: middle;
}

.section{
    margin-top:15px;
    font-size: 15px;
    color: #444;
}

.section b {
    color: #111;
    display: inline-block;
    margin-bottom: 3px;
}

.loading{
    color:#777;
    font-style: italic;
}

</style>
</head>

<body>

<div class="container">

    <div class="reader">

        <div class="toolbar">
            <button onclick="changeFontSize(2)">A+</button>
            <button onclick="changeFontSize(-2)">A-</button>
        </div>

        <div id="content">
            Đang tải nội dung...
        </div>

    </div>

    <div class="dictionary" id="dictionaryPopup">
        
        <span class="close-btn" onclick="closeDictionary()">✕</span>

        <div id="selectedWord">
            Click vào một từ
        </div>

        <div>
            <span id="phonetic"></span>
            <span id="audioBtn" onclick="playAudio()">🔊</span>
        </div>

        <div class="section">
            <b>Nghĩa tiếng Việt</b>
            <div id="meaning"></div>
        </div>

        <div class="section">
            <b>Loại từ</b>
            <div id="partOfSpeech"></div>
        </div>

        <div class="section">
            <b>Định nghĩa tiếng Anh</b>
            <div id="definition"></div>
        </div>

        <div class="section">
            <b>Ví dụ</b>
            <div id="example"></div>
        </div>

    </div>

</div>

<script>

let currentFontSize = 26;
let currentAudio = null;

loadText();

/* ------------------------- */
/* Đọc file text.txt và tách đoạn */
/* ------------------------- */

function loadText(){

    fetch("text.txt")
    .then(res => res.text())
    .then(text => {

        const paragraphs = text.split(/\r?\n+/);

        let html = "";
        let paraCount = 1;

        paragraphs.forEach(para => {
            if(para.trim() === "") return;

            let paraHtml = `<div class="paragraph">
                                <div class="para-num">${paraCount}</div>
                                <div class="para-content">`;
            
            const words = para.split(/(\s+)/);

            words.forEach(item => {
                if(item.trim() === ""){
                    paraHtml += item;
                }
                else{
                    paraHtml += `<span class="word">${item}</span>`;
                }
            });

            paraHtml += `</div></div>`;
            html += paraHtml;
            paraCount++;
        });

        document.getElementById("content").innerHTML = html;

        attachEvents();

    })
    .catch(err => {
        document.getElementById("content").innerHTML =
            "Không thể đọc file text.txt";
        console.error(err);
    });

}

/* ------------------------- */

function attachEvents(){

    document.querySelectorAll(".word")
    .forEach(word => {

        word.addEventListener("click", async () => {

            document
                .querySelectorAll(".word")
                .forEach(w => w.classList.remove("active"));

            word.classList.add("active");

            let cleanWord =
                word.innerText
                .toLowerCase()
                .replace(/[^a-z'-]/g,'');

            if(cleanWord){
                await lookupWord(cleanWord);
            }

        });

    });

}

/* ------------------------- */

function changeFontSize(delta){

    currentFontSize += delta;

    if(currentFontSize < 14)
        currentFontSize = 14;

    document.getElementById("content")
        .style.fontSize = currentFontSize + "px";

}

/* ------------------------- */
/* Hàm Đóng / Mở Popup */
/* ------------------------- */

function openDictionary() {
    document.getElementById("dictionaryPopup").classList.add("show");
}

function closeDictionary() {
    document.getElementById("dictionaryPopup").classList.remove("show");
    document.querySelectorAll(".word").forEach(w => w.classList.remove("active"));
}

/* ------------------------- */
/* Tự động đóng popup khi bấm ra vùng trống bên ngoài */
/* ------------------------- */
document.addEventListener("click", function(e) {
    const popup = document.getElementById("dictionaryPopup");
    
    // Nếu popup đang mở
    if (popup.classList.contains("show")) {
        // Nếu click KHÔNG vào từ (word) và KHÔNG nằm bên trong khung từ điển (dictionary)
        if (!e.target.closest(".word") && !e.target.closest(".dictionary")) {
            closeDictionary();
        }
    }
});

/* ------------------------- */

async function lookupWord(word){

    openDictionary();

    document.getElementById("selectedWord")
        .innerText = word;

    document.getElementById("phonetic")
        .innerText = "...";

    document.getElementById("meaning")
        .innerHTML =
        "<span class='loading'>Đang tra cứu...</span>";

    document.getElementById("definition")
        .innerHTML = "";

    document.getElementById("example")
        .innerHTML = "";

    document.getElementById("partOfSpeech")
        .innerHTML = "";

    currentAudio = null;

    try{

        /* -------------------------
           Dictionary API
        ------------------------- */

        const dictRes =
            await fetch(
                `https://api.dictionaryapi.dev/api/v2/entries/en/${word}`
            );

        const dictData =
            await dictRes.json();

        let phonetic = "";
        let definition = "";
        let example = "";
        let partOfSpeech = "";

        if(Array.isArray(dictData)){

            phonetic =
                dictData[0].phonetic || "";

            const phonetics =
                dictData[0].phonetics || [];

            const audioObj =
                phonetics.find(
                    p => p.audio && p.audio.length > 0
                );

            if(audioObj){
                currentAudio = audioObj.audio;
            }

            if(dictData[0].meanings?.length){

                const firstMeaning =
                    dictData[0].meanings[0];

                partOfSpeech =
                    firstMeaning.partOfSpeech || "";

                if(firstMeaning.definitions?.length){

                    definition =
                        firstMeaning
                        .definitions[0]
                        .definition || "";

                    example =
                        firstMeaning
                        .definitions[0]
                        .example || "";

                }

            }

        }

        document.getElementById("phonetic")
            .innerText = phonetic;

        document.getElementById("definition")
            .innerText = definition;

        document.getElementById("example")
            .innerText = example;

        document.getElementById("partOfSpeech")
            .innerText = partOfSpeech;

        /* -------------------------
           Google Translate
        ------------------------- */

        const transRes =
            await fetch(
                `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${encodeURIComponent(word)}`
            );

        const transData =
            await transRes.json();

        const vietnamese =
            transData[0]
            .map(item => item[0])
            .join("");

        document.getElementById("meaning")
            .innerText = vietnamese;

        /* -------------------------
           Tự động phát âm
        ------------------------- */

        if(currentAudio){

            new Audio(currentAudio).play();

        }else{

            const utter =
                new SpeechSynthesisUtterance(word);

            utter.lang = "en-US";

            speechSynthesis.speak(utter);
        }

    }
    catch(err){

        console.error(err);

        document.getElementById("meaning")
            .innerText = "Không tìm thấy.";

    }

}

/* ------------------------- */

function playAudio(){

    const word =
        document.getElementById("selectedWord")
        .innerText;

    if(!word || word==="Click vào một từ")
        return;

    if(currentAudio){

        new Audio(currentAudio).play();

    }else{

        const utter =
            new SpeechSynthesisUtterance(word);

        utter.lang = "en-US";

        speechSynthesis.speak(utter);

    }

}

</script>

</body>
</html>
